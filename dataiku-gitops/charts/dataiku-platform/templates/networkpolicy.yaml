{{- if and .Values.components.prereqs .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataiku-platform.fullname" . }}-default
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dataiku-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: dataiku
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress.allowAllToDssHttp }}
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 10000
    {{- else }}
    []
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress.allowAll }}
    - {}
    {{- else }}
    []
    {{- end }}
{{- end }}

