apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.nameOverride }}
  labels:
    app.kubernetes.io/name: {{ .Values.nameOverride }}
    app.kubernetes.io/part-of: dataiku
spec:
  serviceName: {{ .Values.nameOverride }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}
        app.kubernetes.io/part-of: dataiku
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      terminationGracePeriodSeconds: 300
      securityContext:
        fsGroup: {{ .Values.security.fsGroup }}
        fsGroupChangePolicy: {{ .Values.security.fsGroupChangePolicy | quote }}
      containers:
        - name: dss
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.security.runAsUser }}
            runAsGroup: {{ .Values.security.runAsGroup }}
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.security.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.security.capabilities | nindent 14 }}
            seccompProfile:
              type: {{ .Values.security.seccompProfile | quote }}
          env:
            - name: DATAIKU_NODE_TYPE
              value: {{ .Values.nodeType | quote }}
            - name: DSS_PORT
              value: {{ .Values.port | quote }}
            - name: DSS_DATADIR
              value: /dataiku/dss
            - name: DSS_LICENSE_FILE
              value: /run/secrets/dataiku/license/license.json
            - name: INSTALL_R_INTEGRATION
              value: {{ .Values.optionalComponents.installRIntegration | quote }}
            - name: INSTALL_GRAPHICS_EXPORT
              value: {{ .Values.optionalComponents.installGraphicsExport | quote }}
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /dataiku/dss
            {{- if .Values.security.tmpfs.enabled }}
            {{- range .Values.security.tmpfs.mounts }}
            - name: tmpfs-{{ .name }}
              mountPath: {{ .mountPath | quote }}
            {{- end }}
            {{- end }}
            - name: dataiku-license
              mountPath: /run/secrets/dataiku/license
              readOnly: true
            - name: docker-config
              mountPath: /home/dataiku/.docker
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.builder.dind.enabled }}
        - name: docker
          image: {{ .Values.builder.dind.image | quote }}
          securityContext:
            privileged: {{ .Values.builder.dind.privileged }}
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
        - name: docker-graph
          emptyDir: {}
        - name: dataiku-license
          secret:
            secretName: dataiku-license
            optional: true
        - name: docker-config
          secret:
            secretName: {{ .Values.builder.dockerConfigSecretName }}
            optional: true
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- if .Values.security.tmpfs.enabled }}
        {{- range .Values.security.tmpfs.mounts }}
        - name: tmpfs-{{ .name }}
          emptyDir:
            medium: Memory
            {{- if .sizeLimit }}
            sizeLimit: {{ .sizeLimit | quote }}
            {{- end }}
        {{- end }}
        {{- end }}
