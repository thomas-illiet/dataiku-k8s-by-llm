apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.nameOverride }}
  labels:
    app.kubernetes.io/name: {{ .Values.nameOverride }}
    app.kubernetes.io/part-of: dataiku
spec:
  serviceName: {{ .Values.nameOverride }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}
        app.kubernetes.io/part-of: dataiku
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      terminationGracePeriodSeconds: 300
      securityContext:
        fsGroup: 1000
      containers:
        - name: dss
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: DATAIKU_NODE_TYPE
              value: {{ .Values.nodeType | quote }}
            - name: DSS_PORT
              value: {{ .Values.port | quote }}
            - name: DSS_DATADIR
              value: /dataiku/dss
            - name: DSS_LICENSE_FILE
              value: /var/run/secrets/dataiku/license/license.json
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /dataiku/dss
            - name: dataiku-license
              mountPath: /var/run/secrets/dataiku/license
              readOnly: true
            - name: docker-config
              mountPath: /home/dataiku/.docker
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.builder.dind.enabled }}
        - name: docker
          image: {{ .Values.builder.dind.image | quote }}
          securityContext:
            privileged: {{ .Values.builder.dind.privileged }}
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
        - name: docker-graph
          emptyDir: {}
        - name: dataiku-license
          secret:
            secretName: dataiku-license
            optional: true
        - name: docker-config
          secret:
            secretName: {{ .Values.builder.dockerConfigSecretName }}
            optional: true
            items:
              - key: .dockerconfigjson
                path: config.json

