nameOverride: dataiku-node
image: registry.internal/dataiku/dss-runtime:14.x.y-1
imagePullPolicy: IfNotPresent
serviceAccountName: dataiku-dss
nodeType: design
replicas: 1
port: 10000
persistence:
  claimName: dataiku-design-data
builder:
  dockerConfigSecretName: dataiku-registry-dockerconfig
  dind:
    enabled: true
    image: docker:27-dind
    privileged: true
security:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  seccompProfile: RuntimeDefault
  capabilities:
    drop:
      - ALL
  tmpfs:
    enabled: true
    mounts:
      - name: tmp
        mountPath: /tmp
        sizeLimit: 2Gi
      - name: var-tmp
        mountPath: /var/tmp
        sizeLimit: 1Gi
      - name: run
        mountPath: /run
        sizeLimit: 256Mi
      - name: home
        mountPath: /home/dataiku
        sizeLimit: 1Gi
optionalComponents:
  installRIntegration: false
  installGraphicsExport: false
ingress:
  enabled: false
  className: nginx
  host: dss.dataiku.internal
  tls:
    enabled: true
    secretName: dataiku-dss-tls
resources: {}
