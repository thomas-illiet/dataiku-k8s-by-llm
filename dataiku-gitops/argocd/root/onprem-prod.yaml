apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dataiku-onprem-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dataiku
spec:
  project: dataiku
  source:
    repoURL: https://git.example.com/platform/dataiku-gitops.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

