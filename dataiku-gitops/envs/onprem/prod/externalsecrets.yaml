# Reference-only mapping for the prod Vault secrets consumed by the Helm chart.
# The chart renders these resources from values.yaml; keep this file in sync
# with values.externalSecrets.items.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-dataiku-prod
  namespace: dataiku
spec:
  provider:
    vault:
      server: https://vault.vault.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: dataiku-prod
          serviceAccountRef:
            name: dataiku-dss
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dataiku-license
  namespace: dataiku
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dataiku-prod
    kind: SecretStore
  target:
    name: dataiku-license
    creationPolicy: Owner
  data:
    - secretKey: license.json
      remoteRef:
        key: kv/dataiku/prod/license
        property: license
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dataiku-registry-dockerconfig
  namespace: dataiku
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dataiku-prod
    kind: SecretStore
  target:
    name: dataiku-registry-dockerconfig
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: kv/dataiku/prod/registry
        property: dockerconfigjson
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dataiku-govern-postgres
  namespace: dataiku
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dataiku-prod
    kind: SecretStore
  target:
    name: dataiku-govern-postgres
    creationPolicy: Owner
  data:
    - secretKey: jdbc-url
      remoteRef:
        key: kv/dataiku/prod/govern-postgres
        property: jdbc_url
    - secretKey: user
      remoteRef:
        key: kv/dataiku/prod/govern-postgres
        property: user
    - secretKey: password-encrypted
      remoteRef:
        key: kv/dataiku/prod/govern-postgres
        property: password_encrypted

